<!-- Name Attribute -->

<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>HTML Level - 3</title>
</head>
<body>
   <form action="/server">
          <div>
                    <label for="username">Username:</label>
                    <input type="text" placeholder="Enter your username" id="username" name="user"/>
          </div>
          <div>
                    <label for="password">Password:</label>
                    <input type="password" placeholder="enter password" id="password" name="pass"/>
          </div>
          <button>submit</button>
          </form>   
          <hr/>
          <form action="https://www.youtube.com/results">
                    <input type="text" placeholder="search on youtube" name="search_query"/>
                    <button>Search</button>
</body>
</html>
