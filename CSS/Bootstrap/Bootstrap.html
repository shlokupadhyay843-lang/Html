<!DOCTYPE html>
<html lang="en">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Bootstrap CSS</title>
          <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet "
        />
        <link rel="stylesheet" href="Bootstrap.css"/>
        
</head>
<body>
  <div class="container">
    <h2>Form Demo</h2>
    <form class="mb-3">
          <label class="form-label" for>Email</label>
          <input type="text" class="form-control" placeholder="Email" id="email" />
          <label class="form-label" for="password">Password</label>
          <input type="text" class="form-control" placeholder="Password" id="password" />
          <label class="form-label" for="address">Address</label>
          <input type="text" class="form-control-lg" placeholder="Address" id="address" />
          <div class="mb-3">
            <select class="form-select">
              <option selected>select something</option>
              <option value="1">One</option>
              <option value="2">Two</option>
              <option value="3">Three</option>
            </select>
          </div>
          <div class="mb-3 form-check">
            <label for="agreebs" class="form-check-label">Agree</label>
            <input type="checkbox" id="agreebs" class="form-check-input" />
          </div>
    </form>

  </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
